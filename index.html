<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Filter Statement - State Bank of India</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="index.css"/>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-landmark"></i>
                    <h1>State Bank of India</h1>
                </div>
                <div class="user-info">
                    <div class="user-avatar">K</div>
                    <span>Komala</span>
                </div>
            </div>
        </header>

        <section class="filter-section">
            <h2 class="filter-title"><i class="fas fa-filter"></i> Filter Statement</h2>
            <div class="filter-form">
                <div class="form-group">
                    <label for="account-number">Account Number</label>
                    <input type="text" id="account-number" placeholder="Enter account number" value="1234567890">
                </div>

                <div class="date-range-group">
                    <label for="date-from">Date Range</label>
                    <div class="date-range">
                        <input type="date" id="date-from" value="2023-01-01">
                        <span>to</span>
                        <input type="date" id="date-to" value="2023-12-31">
                    </div>
                </div>

                <div class="form-group">
                    <label for="transaction-type">Transaction Type</label>
                    <select id="transaction-type">
                        <option value="all">All Transactions</option>
                        <option value="debit">Debit Only</option>
                        <option value="credit">Credit Only</option>
                    </select>
                </div>

                <button class="btn-search" onclick="window.location.href='statement.html'">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </section>

        <footer>
            <p>State Bank of India &copy; 2023. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
